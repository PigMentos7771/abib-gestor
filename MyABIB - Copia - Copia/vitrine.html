<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyABIB · Vitrine Gerencial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/locale/pt-br.min.js"></script>
    <style>
        :root {
            --primary: #4361ee;
            --primary-light: rgba(67, 97, 238, .12);
            --danger: #ef233c;
            --danger-light: rgba(239, 35, 60, .12);
            --warning: #ffb703;
            --warning-light: rgba(255, 183, 3, .12);
            --success: #06d6a0;
            --success-light: rgba(6, 214, 160, .12);
            --bg-page: #f0f2f5;
            --bg-card: #fff;
            --text-main: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --radius: 14px;
            --shadow: 0 2px 12px rgba(0, 0, 0, .07);
            --shadow-md: 0 4px 24px rgba(0, 0, 0, .1);
        }

        body.dark-theme {
            --primary: #90caf9;
            --primary-light: rgba(144, 202, 249, .12);
            --danger: #ef5350;
            --danger-light: rgba(239, 83, 80, .15);
            --warning: #ffb74d;
            --warning-light: rgba(255, 183, 77, .15);
            --success: #66bb6a;
            --success-light: rgba(102, 187, 106, .15);
            --bg-page: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --text-light: #aaa;
            --border: #404040;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            color: var(--text-main);
            min-height: 100vh;
            transition: background .3s, color .3s;
        }

        .hidden {
            display: none !important;
        }

        /* HEADER */
        .vt-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
            gap: 12px;
        }

        .vt-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .vt-logo i {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .vt-logo h1 {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -.5px;
        }

        .vt-logo h1 span {
            color: var(--primary);
        }

        .vt-badge {
            font-size: .7rem;
            font-weight: 700;
            padding: 2px 9px;
            border-radius: 20px;
            background: var(--primary-light);
            color: var(--primary);
        }

        .vt-header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vt-connection {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: .78rem;
            font-weight: 500;
            color: var(--text-light);
        }

        .vt-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--text-light);
            flex-shrink: 0;
        }

        .vt-dot.loading {
            background: var(--warning);
            animation: blink 1s linear infinite;
        }

        .vt-dot.connected {
            background: var(--success);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .vt-dot.disconnected {
            background: var(--danger);
        }

        .vt-ts {
            font-size: .72rem;
            color: var(--text-light);
        }

        @keyframes pulse-dot {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(6, 214, 160, .5);
            }

            50% {
                box-shadow: 0 0 0 5px rgba(6, 214, 160, 0);
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .4;
            }
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: none;
            color: var(--text-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .9rem;
            transition: background .2s, color .2s;
        }

        .icon-btn:hover {
            background: var(--border);
            color: var(--text-main);
        }

        #btn-urgente.ativo {
            background: var(--danger);
            border-color: var(--danger);
            color: #fff;
        }

        /* NAV ABAS */
        .vt-nav {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            padding: 0 1.5rem;
            gap: 4px;
            position: sticky;
            top: 64px;
            /* Altura do header para rolar junto colado debaixo dele */
            z-index: 90;
            /* Um pouco abaixo do header que tem 100 */
        }

        .vt-nav-btn {
            padding: .75rem 1.25rem;
            border: none;
            background: none;
            font-family: inherit;
            font-size: .88rem;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: color .2s, border-color .2s;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .vt-nav-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .vt-nav-btn:hover {
            color: var(--text-main);
        }

        /* MAIN */
        .vt-main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.75rem 1.5rem 4rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .vt-painel {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* SEÇÃO */
        .vt-section {
            display: flex;
            flex-direction: column;
            gap: .75rem;
        }

        .vt-section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .vt-section-header i.sec-icon {
            font-size: 1rem;
        }

        .vt-section-header h2 {
            font-size: 1.05rem;
            font-weight: 700;
        }

        .vt-count-badge {
            font-size: .72rem;
            font-weight: 700;
            padding: 2px 9px;
            border-radius: 20px;
            background: var(--primary-light);
            color: var(--primary);
        }

        .vt-chevron {
            margin-left: auto;
            transition: transform .3s;
            color: var(--text-light);
            font-size: .85rem;
        }

        .vt-chevron.collapsed {
            transform: rotate(-90deg);
        }

        .vt-section-body {
            overflow: hidden;
            transition: max-height .4s ease, opacity .4s ease;
            max-height: 99999px;
            /* Aumentado para não cortar listas no mobile */
            opacity: 1;
        }

        .vt-section-body.collapsed {
            max-height: 0 !important;
            opacity: 0;
        }

        /* FILTROS */
        .vt-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            padding: .75rem 1rem;
            margin-bottom: 1.25rem;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .vt-filters input,
        .vt-filters select {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 7px;
            font-size: .82rem;
            font-family: inherit;
            background: var(--bg-card);
            color: var(--text-main);
            min-width: 120px;
        }

        .vt-filters input {
            flex: 1;
            min-width: 160px;
        }

        .vt-filter-clear {
            font-size: .78rem;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            padding: 4px 6px;
            border-radius: 6px;
        }

        .vt-filter-clear:hover {
            background: var(--primary-light);
        }

        /* PRAZOS GRID */
        .prazos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: .9rem;
        }

        .prazo-card {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 1rem 1.15rem;
            border-left: 5px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: transform .15s, box-shadow .15s;
        }

        .prazo-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .prazo-card.vencido,
        .prazo-card.urgente {
            border-left-color: var(--danger);
        }

        .prazo-card.atencao {
            border-left-color: var(--warning);
        }

        .prazo-card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
        }

        .prazo-tipo {
            font-size: .68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text-light);
        }

        .prazo-badge {
            font-size: .7rem;
            font-weight: 700;
            padding: 2px 9px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .prazo-badge.vencido,
        .prazo-badge.urgente {
            background: var(--danger-light);
            color: var(--danger);
        }

        .prazo-badge.atencao {
            background: var(--warning-light);
            color: #b07a00;
        }

        body.dark-theme .prazo-badge.atencao {
            color: var(--warning);
        }

        .prazo-nome {
            font-size: .95rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .prazo-meta {
            font-size: .78rem;
            color: var(--text-light);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .prazo-data {
            font-size: .8rem;
            font-weight: 600;
        }

        .prazo-data.vencido,
        .prazo-data.urgente {
            color: var(--danger);
        }

        .prazo-data.atencao {
            color: #b07a00;
        }

        body.dark-theme .prazo-data.atencao {
            color: var(--warning);
        }

        /* FUNCIONÁRIOS */
        .func-group {
            display: flex;
            flex-direction: column;
            gap: .6rem;
        }

        .func-group-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .82rem;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: .4px;
            padding-bottom: .5rem;
            border-bottom: 1px solid var(--border);
        }

        .func-unidade-label {
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
            margin: 10px 0 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .func-unidade-label span {
            font-weight: 500;
            background: var(--border);
            padding: 1px 7px;
            border-radius: 10px;
            font-size: .7rem;
        }

        .func-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: .65rem;
        }

        .func-card {
            background: var(--bg-card);
            border-radius: 10px;
            box-shadow: var(--shadow);
            padding: .9rem 1rem;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            border-left: 4px solid var(--success);
        }

        .func-card.aviso {
            border-left-color: var(--warning);
        }

        .func-card.deslig {
            border-left-color: var(--danger);
        }

        .func-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: .9rem;
            flex-shrink: 0;
            background: var(--success-light);
            color: var(--success);
        }

        .func-card.aviso .func-avatar {
            background: var(--warning-light);
            color: var(--warning);
        }

        .func-card.deslig .func-avatar {
            background: var(--danger-light);
            color: var(--danger);
        }

        .func-info {
            flex: 1;
            min-width: 0;
        }

        .func-nome {
            font-size: .88rem;
            font-weight: 600;
            line-height: 1.25;
            word-wrap: break-word;
            /* Permite a quebra e resolve no mobile */
            overflow-wrap: break-word;
        }

        .func-sub {
            font-size: .74rem;
            color: var(--text-light);
            margin-top: 2px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .func-tag {
            font-size: .68rem;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 20px;
            margin-top: 4px;
            display: inline-block;
        }

        .func-tag.aviso {
            background: var(--warning-light);
            color: #b07a00;
        }

        body.dark-theme .func-tag.aviso {
            color: var(--warning);
        }

        .func-tag.deslig {
            background: var(--danger-light);
            color: var(--danger);
        }

        .func-tag.ativo {
            background: var(--success-light);
            color: #008060;
        }

        .func-tag.informacao {
            background: rgba(0, 188, 212, 0.15);
            color: #00bcd4;
        }

        body.dark-theme .func-tag.ativo {
            color: var(--success);
        }

        /* BANCO DE HORAS */
        .func-banco {
            font-size: .75rem;
            font-weight: 500;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* PENDÊNCIAS */
        .pend-list {
            display: flex;
            flex-direction: column;
            gap: .65rem;
        }

        .pend-card {
            background: var(--bg-card);
            border-radius: 10px;
            box-shadow: var(--shadow);
            padding: .9rem 1.1rem;
            display: flex;
            align-items: center;
            gap: .9rem;
            border-left: 4px solid var(--danger);
        }

        .pend-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--danger-light);
            color: var(--danger);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .85rem;
            flex-shrink: 0;
        }

        .pend-info {
            flex: 1;
            min-width: 0;
        }

        .pend-desc {
            font-size: .9rem;
            font-weight: 600;
        }

        .pend-meta {
            font-size: .75rem;
            color: var(--text-light);
            margin-top: 2px;
        }

        .pend-venc {
            font-size: .8rem;
            font-weight: 700;
            text-align: right;
            flex-shrink: 0;
        }

        .pend-venc.vencida {
            color: var(--danger);
        }

        .pend-venc.hoje {
            color: var(--warning);
        }

        .pend-venc.proxima,
        .pend-venc.sem-data {
            color: var(--text-light);
            font-weight: 400;
        }

        /* GASTOS */
        .gastos-total-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.75rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .gastos-icon-wrap {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .gastos-info h3 {
            font-size: .8rem;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 3px;
        }

        .gastos-valor {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .gastos-sub {
            font-size: .78rem;
            color: var(--text-light);
            margin-top: 2px;
        }

        .gastos-table {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow-x: auto;
            /* Permite arrastar tabela lateralmente */
            -webkit-overflow-scrolling: touch;
            /* Suavidade no iOS */
        }

        .gastos-table table {
            width: 100%;
            border-collapse: collapse;
            font-size: .83rem;
        }

        .gastos-table thead th {
            background: var(--bg-page);
            padding: .65rem 1rem;
            text-align: left;
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .4px;
            color: var(--text-light);
            border-bottom: 1px solid var(--border);
        }

        .gastos-table tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background .15s;
        }

        .gastos-table tbody tr:last-child {
            border-bottom: none;
        }

        .gastos-table tbody tr:hover {
            background: var(--bg-page);
        }

        .gastos-table td {
            padding: .65rem 1rem;
            color: var(--text-main);
            white-space: nowrap;
            /* Impede o quebra-cabeça de textos e ativa o scroll lateral natural da tabela */
        }

        .gastos-table td.val {
            font-weight: 700;
            color: var(--primary);
            text-align: right;
        }

        /* ANIVERSARIANTES */
        .aniv-aviso {
            padding: 1.25rem;
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            font-size: .85rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* EMPTY STATE */
        .vt-empty {
            text-align: center;
            padding: 2.25rem 1rem;
            color: var(--text-light);
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .vt-empty i {
            font-size: 2rem;
            margin-bottom: .6rem;
            display: block;
            opacity: .35;
        }

        .vt-empty p {
            font-size: .9rem;
            font-weight: 500;
        }

        /* LOADING */
        #vt-loading {
            position: fixed;
            inset: 0;
            background: var(--bg-page);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            z-index: 9999;
            transition: opacity .4s;
        }

        #vt-loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #vt-loading i {
            font-size: 2.75rem;
            color: var(--primary);
        }

        #vt-loading p {
            font-size: .95rem;
            font-weight: 600;
            color: var(--text-light);
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* RESPONSIVO */
        @media(max-width:640px) {
            .vt-header {
                padding: 0 1rem;
            }

            .vt-badge,
            .vt-ts {
                display: none;
            }

            .vt-main {
                padding: 1rem 1rem 3rem;
            }

            .prazos-grid,
            .func-grid {
                grid-template-columns: 1fr;
            }

            .gastos-total-card {
                flex-direction: column;
                text-align: center;
            }

            .gastos-valor {
                font-size: 1.5rem;
            }

            /* Categoria não é mais escondida no mobile, agora usa scroll horizontal */
            /* .gastos-table table th:nth-child(3),
            .gastos-table table td:nth-child(3) {
                display: none;
            } */
        }

        @media(min-width:641px) and (max-width:1024px) {
            .prazos-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .func-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>

    <!-- LOADING -->
    <div id="vt-loading"><i class="fa-solid fa-circle-notch fa-spin"></i>
        <p>Conectando ao banco de dados...</p>
    </div>

    <!-- HEADER -->
    <header class="vt-header">
        <div class="vt-logo">
            <i class="fa-solid fa-users-gear"></i>
            <h1>My<span>ABIB</span></h1>
            <span class="vt-badge">Vitrine Gerencial</span>
        </div>
        <div class="vt-header-right">
            <span class="vt-ts" id="vt-ultima-atualizacao"></span>
            <div class="vt-connection">
                <div class="vt-dot loading" id="vt-dot"></div>
                <span id="vt-conn-label">Carregando...</span>
            </div>
            <button class="icon-btn" id="btn-urgente" onclick="toggleModoUrgente()" title="Somente urgentes">
                <i class="fa-solid fa-fire"></i>
            </button>
            <button class="icon-btn" id="btn-tema" onclick="toggleTema()" title="Alternar tema">
                <i id="icon-tema" class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <!-- ABAS NAV -->
    <nav class="vt-nav">
        <button class="vt-nav-btn active" onclick="mudarAba('rh')" id="nav-rh">
            <i class="fa-solid fa-users-gear"></i> RH
        </button>
        <button class="vt-nav-btn" onclick="mudarAba('equipe')" id="nav-equipe">
            <i class="fa-solid fa-users"></i> Equipe
        </button>
        <button class="vt-nav-btn" onclick="mudarAba('financeiro')" id="nav-financeiro">

    <script>
        moment.locale('pt-br');

        // ===================== FIREBASE =====================
        const FIREBASE_URL = 'https://bd-abib-8fd56-default-rtdb.firebaseio.com/';
        let dados = null;
        let dadosPontos = {};
        let primeiraConexao = true;
        let ultimaAtualizacao = null;
        let modoUrgente = false;

        const UNIDADES = ['BARBACENA', 'CARATINGA', 'CONGONHAS', 'CONSELHEIRO LAFAIETE', 'CURVELO', 'ITABIRA', 'JANAÚBA', 'JANUÁRIA', 'JOÃO MONLEVADE', 'JUIZ DE FORA I', 'JUIZ DE FORA II', 'LEOPOLDINA', 'MONTES CLAROS I', 'MONTES CLAROS II', 'MONTES CLAROS III', 'PARACATU', 'PIRAPORA', 'SANTANA DO PARAÍSO', 'SÃO JOÃO DEL REI', 'UBÁ', 'UNAÍ'];
        const TIPO_NOMES = { experiencia: 'Fim de Experiência', rescisao: 'Rescisão', aso: 'ASO Demissional', fgts: 'Recolhimento FGTS', ferias: 'Férias', pagamento: 'Pagamento' };
        const SECOES = ['prazos', 'funcionarios', 'pendencias', 'aniversario', 'financeiro'];

        function setConnectionStatus(s) {
            const dot = document.getElementById('vt-dot');
            const lbl = document.getElementById('vt-conn-label');
            dot.className = 'vt-dot ' + s;
            if (s === 'connected') lbl.textContent = 'Atualizado em tempo real';
            if (s === 'disconnected') lbl.textContent = 'Sem conexão';
            if (s === 'loading') lbl.textContent = 'Carregando...';
        }

        function conectarSSE() {
            setConnectionStatus('loading');
            const source = new EventSource(`${FIREBASE_URL}rhfacil.json`);
            source.addEventListener('put', e => {
                try {
                    const p = JSON.parse(e.data);
                    if (p.path === '/' && p.data) { dados = p.data; onDadosRecebidos(); }
                } catch (err) { }
            });
            source.addEventListener('patch', () => fetchManual());
            source.onerror = () => {
                setConnectionStatus('disconnected');
                esconderLoading();
            };
        }

        function conectarSSEPontos() {
            const source = new EventSource(`${FIREBASE_URL}pontos.json`);
            source.addEventListener('put', e => {
                try {
                    const p = JSON.parse(e.data);
                    if (p.path === '/' && p.data) {
                        dadosPontos = p.data;
                        if (dados) { renderFuncionarios(); aplicarVisibilidade(); }
                    }
                } catch (err) { console.error('SSE pontos:', err); }
            });
            source.addEventListener('patch', e => {
                try {
                    const p = JSON.parse(e.data);
                    if (p.data) {
                        Object.assign(dadosPontos, p.data);
                        if (dados) { renderFuncionarios(); aplicarVisibilidade(); }
                    }
                } catch (err) { console.error('SSE pontos patch:', err); }
            });
            source.onerror = () => console.warn('SSE pontos desconectado — reconectando...');
        }

        async function fetchManual() {
            try {
                const r = await fetch(`${FIREBASE_URL}rhfacil.json`);
                const d = await r.json();
                if (d) { dados = d; onDadosRecebidos(); }
            } catch (e) { setConnectionStatus('disconnected'); }
        }

        function onDadosRecebidos() {
            ultimaAtualizacao = new Date();
            setConnectionStatus('connected');
            poblarSelects();
            renderTudo();
            if (primeiraConexao) {
                primeiraConexao = false;
                esconderLoading();
                restaurarEstadoSecoes();
                mudarAba('rh');
            }
        }

        function esconderLoading() {
            const el = document.getElementById('vt-loading');
            if (!el.classList.contains('hidden')) {
                el.classList.add('hidden');
                setTimeout(() => el.remove(), 500);
            }
        }

        // Atualiza timestamp a cada 30s
        setInterval(() => {
            if (!ultimaAtualizacao) return;
            const seg = Math.floor((new Date() - ultimaAtualizacao) / 1000);
            let t;
            if (seg < 60) t = 'Atualizado agora';
            else if (seg < 3600) t = `Há ${Math.floor(seg / 60)} min`;
            else t = `Há ${Math.floor(seg / 3600)}h`;
            const el = document.getElementById('vt-ultima-atualizacao');
            if (el) el.textContent = t;
        }, 30000);

        // ===================== HELPERS =====================
        function esc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        function norm(s) {
            return String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        }
        function formatDate(s) {
            if (!s) return '—';
            const m = moment(s, ['YYYY-MM-DD', 'DD/MM/YYYY'], true);
            return m.isValid() ? m.format('DD/MM/YYYY') : s;
        }
        function formatCurrency(v) {
            return (parseFloat(String(v || 0).replace(',', '.')) || 0)
                .toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }
        function iniciais(nome) {
            const p = String(nome || '').trim().split(' ').filter(Boolean);
            if (p.length >= 2) return (p[0][0] + p[p.length - 1][0]).toUpperCase();
            return (p[0] || '?')[0].toUpperCase();
        }

        // ===================== SELECTS DE UNIDADES =====================
        function poblarSelects() {
            ['f-prazo-unidade', 'f-func-unidade', 'f-gasto-unidade'].forEach(id => {
                const sel = document.getElementById(id);
                if (!sel) return;
                const cur = sel.value;
                // Mantém option "Todas"
                while (sel.options.length > 1) sel.remove(1);
                UNIDADES.forEach(u => {
                    const o = new Option(u, u);
                    sel.add(o);
                });
                if (cur) sel.value = cur;
            });

            // Categorias dinâmicas de gastos
            const gastos = (dados && dados.gastos) || [];
            const cats = [...new Set(gastos.map(g => g.categoria || g.tipo || '').filter(Boolean))].sort();
            const selCat = document.getElementById('f-gasto-cat');
            if (selCat) {
                const cur = selCat.value;
                while (selCat.options.length > 1) selCat.remove(1);
                cats.forEach(c => selCat.add(new Option(c, c)));
                if (cur) selCat.value = cur;
            }
        }

        // ===================== RENDER TUDO =====================
        function renderTudo() {
            renderPrazos();
            renderFuncionarios();
            renderPendencias();
            renderAniversariantes();
            renderGastos();
            aplicarVisibilidade();
            atualizarTitulo();
        }

        // ===================== TEMA =====================
        function toggleTema() {
            const escuro = document.body.classList.toggle('dark-theme');
            document.getElementById('icon-tema').className = escuro ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            localStorage.setItem('vt_tema', escuro ? 'escuro' : 'claro');
        }
        if (localStorage.getItem('vt_tema') === 'escuro') {
            document.body.classList.add('dark-theme');
            document.getElementById('icon-tema').className = 'fa-solid fa-sun';
        }

        // ===================== ABAS =====================
        function mudarAba(aba) {
            document.getElementById('painel-rh').classList.toggle('hidden', aba !== 'rh');
            document.getElementById('painel-equipe').classList.toggle('hidden', aba !== 'equipe');
            document.getElementById('painel-financeiro').classList.toggle('hidden', aba !== 'financeiro');
            document.getElementById('nav-rh').classList.toggle('active', aba === 'rh');
            document.getElementById('nav-equipe').classList.toggle('active', aba === 'equipe');
            document.getElementById('nav-financeiro').classList.toggle('active', aba === 'financeiro');
            // Retorna ao topo ao trocar de aba
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ===================== SEÇÕES RECOLHÍVEIS =====================
        function toggleSecao(id) {
            const body = document.getElementById('body-' + id);
            const chevron = document.getElementById('chevron-' + id);
            if (!body) return;
            const recolhido = body.classList.toggle('collapsed');
            if (chevron) chevron.classList.toggle('collapsed', recolhido);
            localStorage.setItem('vt_sec_' + id, recolhido ? '0' : '1');
        }
        function restaurarEstadoSecoes() {
            SECOES.forEach(id => {
                if (localStorage.getItem('vt_sec_' + id) === '0') toggleSecao(id);
            });
        }

        // ===================== MODO URGENTE =====================
        function toggleModoUrgente() {
            modoUrgente = !modoUrgente;
            document.getElementById('btn-urgente').classList.toggle('ativo', modoUrgente);
            aplicarVisibilidade(); // delega a decisão de visibilidade
            renderPrazos();        // re-renderiza prazos com filtro de urgentes
        }

        // ===================== VISIBILIDADE =====================
        function aplicarVisibilidade() {
            const vv = (dados && dados.configuracoes && dados.configuracoes.vitrineVisibilidade) || {};
            // Funcionários: ocultar se Firebase desativou (modo urgente não afeta — aba separada)
            const mostrarFunc = vv.funcionarios !== false;
            document.getElementById('secao-funcionarios').classList.toggle('hidden', !mostrarFunc);
            // Aniversariantes: ocultar se Firebase desativou funcionários
            const sa = document.getElementById('secao-aniversario');
            if (sa) sa.classList.toggle('hidden', !mostrarFunc);
            // Pendências: ocultar se Firebase desativou OU se modo urgente ativo
            const mostrarPend = vv.pendencias !== false && !modoUrgente;
            document.getElementById('secao-pendencias').classList.toggle('hidden', !mostrarPend);
            // Banco de horas: ocultar linhas se vv.ponto === false
            document.querySelectorAll('.func-banco').forEach(el => {
                el.classList.toggle('hidden', vv.ponto === false);
            });
        }

        // ===================== TÍTULO DA ABA =====================
        function atualizarTitulo() {
            const prazos = (dados && dados.prazos) || [];
            const cfg = (dados && dados.configuracoes) || {};
            const hoje = new Date();
            const urgentes = prazos.filter(p => {
                if (!p.dataVencimento) return false;
                const diff = Math.ceil((new Date(p.dataVencimento) - hoje) / 86400000);
                const lim = p.tipoCod === 'aso' ? (cfg.diasAsoUrgente || 3) : (cfg.diasUrgente || 7);
                return diff <= lim;
            }).length;
            document.title = urgentes > 0
                ? `(${urgentes} urgente${urgentes > 1 ? 's' : ''}) MyABIB Vitrine`
                : 'MyABIB · Vitrine Gerencial';
        }

        // ===================== LIMPAR FILTROS =====================
        function limparFiltros(grupo) {
            if (grupo === 'prazo') {
                ['f-prazo-nome', 'f-prazo-unidade', 'f-prazo-tipo', 'f-prazo-status'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.value = '';
                });
                renderPrazos();
            } else if (grupo === 'func') {
                ['f-func-nome', 'f-func-unidade', 'f-func-status'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.value = '';
                });
                renderFuncionarios();
            } else if (grupo === 'gasto') {
                ['f-gasto-desc', 'f-gasto-unidade', 'f-gasto-cat'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.value = '';
                });
                renderGastos();
            }
        }

        // ===================== PRAZOS =====================
        function renderPrazos() {
            const container = document.getElementById('prazos-container');
            const countEl = document.getElementById('prazos-count');
            const cfg = (dados && dados.configuracoes) || {};
            const diasUrgente = parseInt(cfg.diasUrgente) || 7;
            const diasAtencao = parseInt(cfg.diasAtencao) || 15;
            const diasAsoUrg = parseInt(cfg.diasAsoUrgente) || 3;
            const diasAsoAtc = parseInt(cfg.diasAsoAtencao) || 7;
            const diasOcult = parseInt(cfg.diasVencidosOcultar) ?? 10;
            const vv = cfg.vitrineVisibilidade || {};

            const prazos = (dados && dados.prazos) || [];
            const hoje = moment().startOf('day');

            const fNome = norm(document.getElementById('f-prazo-nome')?.value || '');
            const fUnidade = (document.getElementById('f-prazo-unidade')?.value || '').toLowerCase();
            const fTipo = document.getElementById('f-prazo-tipo')?.value || '';
            const fStatus = document.getElementById('f-prazo-status')?.value || '';

            const lista = [];
            prazos.forEach(p => {
                if (!p || !p.dataVencimento) return;
                // Filtrar contratos de experiência se vitrineVisibilidade.contratos === false
                if (vv.contratos === false && p.tipoCod === 'experiencia') return;

                const isAso = p.tipoCod === 'aso';
                const limUr = isAso ? diasAsoUrg : diasUrgente;
                const limAt = isAso ? diasAsoAtc : diasAtencao;
                const diasFalt = moment(p.dataVencimento).startOf('day').diff(hoje, 'days');

                if (diasFalt < -diasOcult) return;

                let status;
                if (diasFalt < 0) status = 'vencido';
                else if (diasFalt <= limUr) status = 'urgente';
                else if (diasFalt <= limAt) status = 'atencao';
                else return;

                if (modoUrgente && status === 'atencao') return;
                if (fTipo && p.tipoCod !== fTipo) return;
                if (fStatus && status !== fStatus) return;
                if (fNome && !norm(p.nomeFuncionario || p.nome || '').includes(fNome)) return;
                if (fUnidade && norm(p.unidade || '') !== fUnidade) return;

                lista.push({ ...p, diasFalt, status });
            });

            lista.sort((a, b) => {
                const o = { vencido: 0, urgente: 1, atencao: 2 };
                if (o[a.status] !== o[b.status]) return o[a.status] - o[b.status];
                return moment(a.dataVencimento).valueOf() - moment(b.dataVencimento).valueOf();
            });

            countEl.textContent = lista.length;
            if (!lista.length) {
                container.innerHTML = `<div class="vt-empty"><i class="fa-solid fa-circle-check" style="color:var(--success)"></i><p>Nenhum prazo crítico no momento ✅</p></div>`;
                return;
            }

            const cards = lista.map(p => {
                const tipo = esc(TIPO_NOMES[p.tipoCod] || p.tipoCod || '—');
                const nome = esc(p.nomeFuncionario || p.nome || '—');
                const unid = esc(p.unidade || '');
                let badge;
                if (p.diasFalt < 0) badge = `Vencido há ${Math.abs(p.diasFalt)} d`;
                else if (p.diasFalt === 0) badge = 'VENCE HOJE';
                else badge = `${p.diasFalt} dias restantes`;
                const valHtml = (p.tipoCod === 'pagamento' && p.valor)
                    ? `<span><i class="fa-solid fa-money-bill-wave"></i> ${esc(p.valor)}</span>` : '';
                return `<div class="prazo-card ${p.status}">
      <div class="prazo-card-top">
        <span class="prazo-tipo">${tipo}</span>
        <span class="prazo-badge ${p.status}">${badge}</span>
      </div>
      <div class="prazo-nome">${nome}</div>
      <div class="prazo-meta">${unid ? `<span><i class="fa-solid fa-location-dot"></i> ${unid}</span>` : ''}${valHtml}</div>
      <div class="prazo-data ${p.status}"><i class="fa-regular fa-calendar"></i> ${formatDate(p.dataVencimento)}</div>
    </div>`;
            }).join('');

            container.innerHTML = `<div class="prazos-grid">${cards}</div>`;
        }

        // ===================== BANCO DE HORAS =====================
        function getBancoHoras(idFunc) {
            if (!idFunc || !dadosPontos) return 0;
            const chaves = Object.keys(dadosPontos).filter(k => k.startsWith(idFunc + '_'));
            const conferidos = chaves.filter(k => dadosPontos[k] && dadosPontos[k].conferido === true);
            if (!conferidos.length) return 0;
            conferidos.sort((a, b) => {
                const mA = a.replace(idFunc + '_', '');
                const mB = b.replace(idFunc + '_', '');
                return mB.localeCompare(mA);
            });
            return dadosPontos[conferidos[0]].fechamentoAcumulado || 0;
        }

        function formatBanco(totalMins) {
            if (totalMins === 0) return { texto: '00:00', cor: 'var(--text-light)' };
            const sinal = totalMins < 0 ? '-' : '+';
            const abs = Math.abs(totalMins);
            const h = Math.floor(abs / 60).toString().padStart(2, '0');
            const m = (abs % 60).toString().padStart(2, '0');
            const cor = totalMins > 0 ? 'var(--success)' : 'var(--danger)';
            return { texto: `${sinal}${h}:${m}`, cor };
        }

        // ===================== FUNCIONÁRIOS =====================
        function getBadgeStatus(f) {
            if (f.desligado) return { cls: 'deslig', texto: 'DESLIGADO', extra: `Desligado em ${formatDate(f.dataDesligamento) || '—'}` };
            if (f.emAvisoPrevio) return { cls: 'aviso', texto: 'EM AVISO PRÉVIO', extra: `Fim: ${formatDate(f.dataFimAviso) || '—'}` };

            const hoje = moment().startOf('day');
            const dataAdm = moment(f.admissao).startOf('day');
            if (dataAdm.isAfter(hoje)) {
                return { cls: 'informacao', texto: 'ADMISSÃO PREVISTA', extra: dataAdm.format('DD/MM/YYYY') };
            }

            if (f.idPrazoVinculado && dados && dados.prazos) {
                const prazoInfo = dados.prazos.find(p => p && p.id === f.idPrazoVinculado);
                if (prazoInfo) {
                    const diasFaltandoExp = moment(prazoInfo.dataVencimento).startOf('day').diff(hoje, 'days');
                    if (diasFaltandoExp >= 0) {
                        return { cls: 'aviso', texto: 'EM EXPERIÊNCIA', extra: `Fim: ${formatDate(prazoInfo.dataVencimento)} (${diasFaltandoExp}d rest.)` };
                    }
                }
            }

            return { cls: 'ativo', texto: 'ATIVO', extra: `Desde ${formatDate(f.admissao) || '—'}` };
        }

        function renderFuncionarios() {
            const container = document.getElementById('func-container');
            const funcs = (dados && dados.funcionarios) || [];
            const lim30 = moment().subtract(30, 'days').startOf('day');

            const fNome = norm(document.getElementById('f-func-nome')?.value || '');
            const fUnidade = (document.getElementById('f-func-unidade')?.value || '').toLowerCase();
            const fStatus = document.getElementById('f-func-status')?.value || '';

            // 1. Filtrar: ativos + aviso + desligados últimos 30 dias
            let visiveis = funcs.filter(f => {
                if (f.emAvisoPrevio === true) return true;
                if (f.desligado === true) {
                    if (!f.dataDesligamento) return true;
                    return moment(f.dataDesligamento).startOf('day').isSameOrAfter(lim30);
                }
                return true;
            });

            // 2. Filtro de status
            if (fStatus === 'ativo') visiveis = visiveis.filter(f => !f.desligado && !f.emAvisoPrevio);
            if (fStatus === 'aviso') visiveis = visiveis.filter(f => f.emAvisoPrevio === true);
            if (fStatus === 'deslig') visiveis = visiveis.filter(f => f.desligado === true);
            if (fStatus === 'exp') {
                visiveis = visiveis.filter(f => {
                    if (f.desligado || f.emAvisoPrevio || !f.idPrazoVinculado || !dados.prazos) return false;
                    const pr = dados.prazos.find(p => p && p.id === f.idPrazoVinculado);
                    if (!pr) return false;
                    const diff = moment(pr.dataVencimento).startOf('day').diff(moment().startOf('day'), 'days');
                    return diff >= 0;
                });
            }

            // 3. Filtros de texto
            if (fNome) visiveis = visiveis.filter(f => norm(f.nome || '').includes(fNome));
            if (fUnidade) visiveis = visiveis.filter(f => norm(f.unidade || '') === fUnidade);

            if (!visiveis.length) {
                container.innerHTML = `<div class="vt-empty"><i class="fa-solid fa-users-slash"></i><p>Nenhum funcionário encontrado.</p></div>`;
                return;
            }

            // 4. Agrupar por unidade
            const grupos = {};
            visiveis.forEach(f => {
                const u = f.unidade || 'Sem Unidade';
                if (!grupos[u]) grupos[u] = [];
                grupos[u].push(f);
            });

            // 5. Ordena dentro de cada unidade: ativos > aviso > desligados
            const ordemStatus = f => f.desligado ? 2 : f.emAvisoPrevio ? 1 : 0;
            Object.values(grupos).forEach(lista => lista.sort((a, b) => ordemStatus(a) - ordemStatus(b)));

            // 6. Render
            const vv = (dados && dados.configuracoes && dados.configuracoes.vitrineVisibilidade) || {};
            const mostrarBanco = vv.ponto !== false;
            const total = visiveis.length;
            const unidadesOrdenadas = Object.keys(grupos).sort();

            const html = unidadesOrdenadas.map(u => {
                const cards = grupos[u].map(f => {
                    const badge = getBadgeStatus(f);
                    const ini = iniciais(f.nome);
                    const nome = esc(f.nome || '—');
                    const cargo = esc(f.funcao || f.cargo || '—');

                    // Banco de horas — só para ativos
                    let bancoHtml = '';
                    if (!f.desligado && !f.emAvisoPrevio && mostrarBanco) {
                        const banco = formatBanco(getBancoHoras(f.id || f.idFunc));
                        bancoHtml = `<div class="func-banco" style="color:${banco.cor}">
                            <i class="fa-solid fa-scale-balanced"></i> Banco: <strong>${banco.texto}</strong>
                        </div>`;
                    }

                    return `<div class="func-card ${badge.cls === 'ativo' ? '' : badge.cls}">
                        <div class="func-avatar">${ini}</div>
                        <div class="func-info">
                            <div class="func-nome">${nome}</div>
                            <div class="func-sub">${cargo}</div>
                            <span class="func-tag ${badge.cls}">${badge.texto} · ${badge.extra}</span>
                            ${bancoHtml}
                        </div>
                    </div>`;
                }).join('');

                return `<div class="func-unidade-label">📍 ${esc(u)} <span>${grupos[u].length}</span></div>
                    <div class="func-grid">${cards}</div>`;
            }).join('');

            container.innerHTML = `<div class="func-group">
                <div class="func-group-label">Funcionários
                    <span style="font-size:.72rem;font-weight:600;background:var(--border);padding:1px 8px;border-radius:10px;">${total}</span>
                </div>
                ${html}
            </div>`;
        }

        // ===================== PENDÊNCIAS =====================
        function renderPendencias() {
            const container = document.getElementById('pend-container');
            const countEl = document.getElementById('pend-count');
            const pends = (dados && dados.pendencias) || [];
            const hoje = moment().startOf('day');

            const criticas = pends
                .filter(p => p.concluida !== true && p.prioridade === 'alta')
                .sort((a, b) => {
                    if (!a.vencimento && !b.vencimento) return 0;
                    if (!a.vencimento) return 1;
                    if (!b.vencimento) return -1;
                    return moment(a.vencimento).valueOf() - moment(b.vencimento).valueOf();
                });

            countEl.textContent = criticas.length;
            if (!criticas.length) {
                container.innerHTML = `<div class="vt-empty"><i class="fa-solid fa-circle-check" style="color:var(--success)"></i><p>Nenhuma pendência crítica no momento ✅</p></div>`;
                return;
            }

            const items = criticas.map(p => {
                let vencHtml = 'Sem prazo', vencClass = 'sem-data';
                if (p.vencimento) {
                    const dias = moment(p.vencimento).startOf('day').diff(hoje, 'days');
                    if (dias < 0) { vencHtml = `Vencida<br><small>${Math.abs(dias)}d atrás</small>`; vencClass = 'vencida'; }
                    else if (dias === 0) { vencHtml = 'HOJE'; vencClass = 'hoje'; }
                    else { vencHtml = `${formatDate(p.vencimento)}<br><small>${dias} dias</small>`; vencClass = 'proxima'; }
                }
                return `<div class="pend-card">
      <div class="pend-icon"><i class="fa-solid fa-circle-exclamation"></i></div>
      <div class="pend-info">
        <div class="pend-desc">${esc(p.descricao)}</div>
        <div class="pend-meta">${esc(p.categoria || 'Geral')} · Criado em ${formatDate(p.dataCriacao)}</div>
      </div>
      <div class="pend-venc ${vencClass}">${vencHtml}</div>
    </div>`;
            }).join('');

            container.innerHTML = `<div class="pend-list">${items}</div>`;
        }

        // ===================== ANIVERSARIANTES =====================
        function renderAniversariantes() {
            const container = document.getElementById('aniv-container');
            const secao = document.getElementById('secao-aniversario');
            const funcs = (dados && dados.funcionarios) || [];
            const mesAtual = new Date().getMonth() + 1;

            const temCampo = funcs.some(f => f.dataNascimento);
            if (!temCampo) {
                container.innerHTML = `<div class="aniv-aviso">
      <i class="fa-solid fa-circle-info" style="color:var(--primary);font-size:1.1rem;"></i>
      Campo de data de nascimento não cadastrado nos funcionários. Adicione este campo no sistema principal para ativar esta seção.
    </div>`;
                if (secao) secao.classList.remove('hidden');
                return;
            }

            const aniv = funcs.filter(f => {
                if (f.desligado || !f.dataNascimento) return false;
                return new Date(f.dataNascimento).getMonth() + 1 === mesAtual;
            }).sort((a, b) => new Date(a.dataNascimento).getDate() - new Date(b.dataNascimento).getDate());

            if (!aniv.length) { if (secao) secao.classList.add('hidden'); return; }
            if (secao) secao.classList.remove('hidden');

            const cards = aniv.map(f => {
                const dia = moment(f.dataNascimento).format('DD/MM');
                const ini = iniciais(f.nome);
                return `<div class="func-card" style="border-left-color:var(--primary)">
      <div class="func-avatar" style="background:var(--primary-light);color:var(--primary)">${ini}</div>
      <div class="func-info">
        <div class="func-nome">${esc(f.nome || '—')}</div>
        <div class="func-sub">${esc(f.unidade || '—')}</div>
        <span class="func-tag ativo">🎂 ${dia}</span>
      </div>
    </div>`;
            }).join('');
            container.innerHTML = `<div class="func-grid">${cards}</div>`;
        }

        // ===================== GASTOS =====================
        function renderGastos() {
            const totalCont = document.getElementById('gastos-total-container');
            const listCont = document.getElementById('gastos-list-container');
            const gastos = (dados && dados.gastos) || [];
            const mesAtual = moment().format('YYYY-MM');
            const nomeMes = moment().format('MMMM/YYYY');

            const fDesc = norm(document.getElementById('f-gasto-desc')?.value || '');
            const fUnidade = (document.getElementById('f-gasto-unidade')?.value || '').toLowerCase();
            const fCat = (document.getElementById('f-gasto-cat')?.value || '').toLowerCase();

            // Correção add2: usar campo 'data' (YYYY-MM-DD), não 'mes' (campo inexistente)
            const doMes = gastos.filter(g => (g.data || '').startsWith(mesAtual));

            // Total sempre considera TODOS do mês (sem filtro)
            const total = doMes.reduce((s, g) => s + (parseFloat(String(g.valor || 0).replace(',', '.')) || 0), 0);
            const nomeMesCap = nomeMes.charAt(0).toUpperCase() + nomeMes.slice(1);
            totalCont.innerHTML = `<div class="gastos-total-card">
    <div class="gastos-icon-wrap"><i class="fa-solid fa-wallet"></i></div>
    <div class="gastos-info">
      <h3>Total em ${esc(nomeMesCap)}</h3>
      <div class="gastos-valor">${formatCurrency(total)}</div>
      <div class="gastos-sub">${doMes.length} lançamento${doMes.length !== 1 ? 's' : ''}</div>
    </div>
  </div>`;

            // Lista filtrada, máx 10, mais recentes primeiro
            let filtrados = doMes.filter(g => {
                if (fDesc && !norm(g.descricao || '').includes(fDesc)) return false;
                if (fUnidade && norm(g.unidade || g.unit || '') !== fUnidade) return false;
                if (fCat && norm(g.categoria || g.tipo || '') !== fCat) return false;
                return true;
            });
            filtrados.sort((a, b) => String(b.data || '').localeCompare(String(a.data || '')));
            const top10 = filtrados.slice(0, 10);

            if (!top10.length) {
                listCont.innerHTML = `<div class="vt-empty"><i class="fa-solid fa-receipt"></i><p>Nenhum lançamento registrado neste mês.</p></div>`;
                return;
            }

            const rows = top10.map(g => {
                const data = g.data ? moment(g.data).format('DD/MM') : '—';
                const desc = esc(g.descricao || '—');
                const cat = esc(g.categoria || g.tipo || '—');
                const unid = esc(g.unidade || '—');
                const val = formatCurrency(g.valor);
                return `<tr>
      <td>${data}</td>
      <td>${desc}</td>
      <td>${cat}</td>
      <td>${unid}</td>
      <td class="val">${val}</td>
    </tr>`;
            }).join('');

            listCont.innerHTML = `<div class="gastos-table">
      <table>
        <thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Unidade</th><th style="text-align:right">Valor</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
        }

        // ===================== INICIAR =====================
        conectarSSE();
        conectarSSEPontos();
    </script>
</body>

</html>
